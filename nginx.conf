# /etc/nginx/sites-available/quaest
# Serves both cyber.keltonshockey.com and quaest.tech
# Setup:
#   certbot --nginx -d quaest.tech -d www.quaest.tech  (first time only)
#   cp nginx.conf /etc/nginx/sites-available/quaest
#   ln -sf /etc/nginx/sites-available/quaest /etc/nginx/sites-enabled/quaest
#   nginx -t && systemctl reload nginx

# Redirect HTTP → HTTPS for all domains
server {
    listen 80;
    server_name cyber.keltonshockey.com quaest.tech www.quaest.tech;
    return 301 https://$host$request_uri;
}

# cyber.keltonshockey.com
server {
    listen 443 ssl http2;
    server_name cyber.keltonshockey.com;

    ssl_certificate /etc/letsencrypt/live/cyber.keltonshockey.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cyber.keltonshockey.com/privkey.pem;

    root /opt/cyberscreener/frontend/dist;
    index index.html;

    # API — proxy to FastAPI
    location ~ ^/(api|health|stats|scores|plays|weights|scan|backtest|calibrate|auth|killer-plays|market|ticker|chart|watchlist|signals|augur) {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # SPA fallback — all other routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# quaest.tech (primary public domain)
server {
    listen 443 ssl http2;
    server_name quaest.tech www.quaest.tech;

    # Run: certbot --nginx -d quaest.tech -d www.quaest.tech
    ssl_certificate /etc/letsencrypt/live/quaest.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/quaest.tech/privkey.pem;

    root /opt/cyberscreener/frontend/dist;
    index index.html;

    # API — proxy to FastAPI
    location ~ ^/(api|health|stats|scores|plays|weights|scan|backtest|calibrate|auth|killer-plays|market|ticker|chart|watchlist|signals|augur) {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # SPA fallback — all other routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
