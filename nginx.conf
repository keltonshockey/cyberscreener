# /etc/nginx/sites-available/quaest
# Serves both cyber.keltonshockey.com and quaest.tech
# Setup:
#   certbot --nginx -d quaest.tech  (first time only)
#   cp nginx.conf /etc/nginx/sites-available/quaest
#   ln -sf /etc/nginx/sites-available/quaest /etc/nginx/sites-enabled/quaest
#   nginx -t && systemctl reload nginx

# Rate limiting — 20 req/s per IP, burst 50
limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;

# Redirect HTTP → HTTPS for all domains
server {
    listen 80;
    server_name cyber.keltonshockey.com quaest.tech;
    return 301 https://$host$request_uri;
}

# cyber.keltonshockey.com
server {
    listen 443 ssl http2;
    server_name cyber.keltonshockey.com;

    ssl_certificate /etc/letsencrypt/live/cyber.keltonshockey.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cyber.keltonshockey.com/privkey.pem;

    root /opt/cyberscreener/frontend/dist;
    index index.html;

    # Gzip compression — reduces JSON payloads ~70%
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 1024;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Auth endpoints — tighter rate limit (5 req/s, burst 10)
    location ~ ^/auth {
        limit_req zone=auth burst=10 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_buffering on;
        proxy_buffer_size 32k;
        proxy_buffers 8 32k;
    }

    # API — proxy to FastAPI
    location ~ ^/(api|health|stats|scores|plays|weights|scan|backtest|calibrate|killer-plays|market|ticker|chart|watchlist|signals|augur|intel|universe|tickers|earnings|notify|alerts|inverse-plays|backfill|ai) {
        limit_req zone=api burst=50 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 120s;
        proxy_buffering on;
        proxy_buffer_size 32k;
        proxy_buffers 8 32k;
    }

    # SPA fallback — all other routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}

