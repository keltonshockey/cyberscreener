# /etc/nginx/sites-available/cyber.keltonshockey.com
# Symlink to sites-enabled, then: sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name cyber.keltonshockey.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name cyber.keltonshockey.com;

    # SSL certs (certbot)
    ssl_certificate /etc/letsencrypt/live/cyber.keltonshockey.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cyber.keltonshockey.com/privkey.pem;

    # Proxy to Docker container
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (if needed later)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
